<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Chat Space</title>
    <!-- PWA Manifest for "Add to Home Screen" -->
    <link rel="manifest" href="data:application/manifest+json;base64,eyJuYW1lIjoiQ2hhdCBTcGFjZSIsInNob3J0X25hbWUiOiJDaGF0U3BhY2UiLCJzdGFydF91cmwiOiIuIiwiZGlzcGxheSI6InN0YW5kYWxvbmUiLCJiYWNrZ3JvdW5kX2NvbG9yIjoiIzBwMTcyYSIsInRoZW1lX2NvbG9yIjoiIzBwMTcyYSIsImljb25zIjpbeyJzcmMiOiJodHRwczov2x1Y2lkZS5kZXYvbG9nby5zdmciLCJzaXplcyI6IjE5MngxOTIiLCJ0eXBlIjoiaW1hZ2Uvc3ZnK3htbCJ9XX0=">
    <meta name="theme-color" content="#0f172a">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <!-- Import PeerJS -->
    <script src="https://unpkg.com/peerjs@1.5.2/dist/peerjs.min.js"></script>
    <script type="module">
        console.log("App starting...");
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js";
        import { 
            getAuth, 
            signInAnonymously, 
            signInWithCustomToken,
            onAuthStateChanged,
            signOut
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js";
        import { 
            getFirestore, 
            collection, 
            addDoc, 
            query, 
            orderBy, 
            onSnapshot, 
            where, 
            serverTimestamp, 
            doc, 
            setDoc, 
            getDocs,
            getDoc,
            updateDoc,
            arrayUnion,
            arrayRemove,
            limit,
            Timestamp,
            deleteDoc,
            writeBatch
        } from "https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js";

        // --- Service Worker for PWA Support ---
        if ('serviceWorker' in navigator) {
            const swContent = `
                self.addEventListener('install', (e) => self.skipWaiting());
                self.addEventListener('activate', (e) => e.waitUntil(self.clients.claim()));
                self.addEventListener('fetch', (e) => {}); 
            `;
            const blob = new Blob([swContent], {type: 'text/javascript'});
            const swUrl = URL.createObjectURL(blob);
            navigator.serviceWorker.register(swUrl)
                .then(() => console.log('SW registered'))
                .catch(err => console.error('SW failed', err));
        }

        // --- Configuration ---
        // Load the Firebase config securely from the environment
        let firebaseConfig;
        try {
            firebaseConfig = JSON.parse(__firebase_config);
        } catch (e) {
            console.error("Firebase config not found in environment. Please ensure the app is connected to Firebase.");
            // Fallback structure to prevent immediate crash before error handling catches it
            firebaseConfig = { apiKey: "", authDomain: "", projectId: "" };
        }

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'default-chat-app';

        const MAX_DAILY_MESSAGES = 400;
        const MAX_CONCURRENT_USERS = 50;
        const MAX_CHAT_HISTORY = 20; 
        const ADMIN_CODE = "07312012";
        const SUPPORT_CHAT_ID = 'admin-support-channel';
        
        const BAD_WORDS = [
            'badword', 'swear', 'curse', 'ugly', 'stupid', 'hate', 
            'fuck', 'shit', 'bitch', 'asshole', 'cunt', 'dick', 
            'pussy', 'bastard', 'whore', 'slut', 'damn', 'crap'
        ]; 

        // Sound & Audio Context
        let audioCtx = null;
        let keepAliveOscillator = null;
        
        const initAudio = () => {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
        };

        const playNotificationSound = () => {
            if (!state.notificationsEnabled) return; 
            try {
                initAudio();
                const osc = audioCtx.createOscillator();
                const gain = audioCtx.createGain();
                osc.connect(gain);
                gain.connect(audioCtx.destination);
                osc.type = 'sine';
                osc.frequency.setValueAtTime(500, audioCtx.currentTime);
                gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
                osc.start();
                osc.stop(audioCtx.currentTime + 0.1);
            } catch(e) { console.log("Audio play failed", e); }
        };

        // --- Load Initial State from Local Storage ---
        const savedUsername = localStorage.getItem('chat_username') || '';
        let savedContacts = [];
        try {
            savedContacts = JSON.parse(localStorage.getItem('chat_contacts') || '[]');
        } catch (e) {
            console.error("Failed to parse contacts", e);
            savedContacts = [];
        }

        // --- State ---
        const state = {
            user: null,
            username: savedUsername, 
            hasJoined: false,
            isAdmin: false, 
            showAdminPanel: false, 
            isBanned: false, 
            isAppealing: false, 
            activeTab: 'global',
            activeChatId: 'global',
            activeChatName: 'Global Chat',
            activeChatType: 'global',
            isSidebarOpen: window.innerWidth >= 768,
            messages: [],
            myChats: [],
            contacts: savedContacts,
            activeUsers: [], 
            bannedUsers: [], 
            dailyMessageCount: 0,
            unreadChats: new Set(), 
            notificationsEnabled: true,
            backgroundMode: false,
            joinError: '',
            authError: '', 
            dbError: '', 
            isJoining: false,
            unsubscribes: [],
            peer: null,
            localStream: null,
            remoteStream: null,
            currentCall: null,
            isCallActive: false,
            callStatus: '',
            incomingCall: null,
            channelVoiceActive: false
        };

        const root = document.getElementById('root');

        // --- Authentication & Init ---
        async function initAuth() {
            try {
                if (!firebaseConfig.apiKey) throw new Error("Firebase configuration is missing.");
                
                if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } else {
                    await signInAnonymously(auth);
                }
            } catch (error) {
                console.error("Auth error:", error);
                state.authError = error.message;
                render();
            }
        }

        onAuthStateChanged(auth, (user) => {
            state.user = user;
            if (user) {
                state.authError = '';
                if (state.username) {
                    state.hasJoined = true;
                    initPeer(user.uid);
                    setupListeners();
                }
            }
            render();
        });

        initAuth();

        // --- PeerJS Initialization ---
        function initPeer(uid) {
            const peerId = `chat-space-${uid}`;
            
            if (state.peer) state.peer.destroy();

            state.peer = new Peer(peerId, {
                config: { iceServers: [{ urls: 'stun:stun1.l.google.com:19302' }, { urls: 'stun:stun2.l.google.com:19302' }] },
                debug: 1
            });

            state.peer.on('open', (id) => {
                console.log('My peer ID is: ' + id);
            });

            state.peer.on('call', (call) => {
                const meta = call.metadata || {};
                const callerName = meta.callerName || 'Unknown';
                const callType = meta.callType || 'dm';
                const chatId = meta.chatId || 'unknown';

                if (state.isCallActive) {
                    call.close();
                    return;
                }

                state.incomingCall = { call, callerName, callType, chatId };
                sendNotification(`Incoming Call`, `${callerName} is calling you...`);
                playNotificationSound();
                if (navigator.vibrate) navigator.vibrate([300, 200, 300, 200, 300]);
                render();
            });

            state.peer.on('error', (err) => {
                console.error('PeerJS error:', err);
            });
        }

        // --- Notifications ---
        function requestNotificationPermission() {
            initAudio();
            if (!("Notification" in window)) return;

            if (Notification.permission === 'default') {
                Notification.requestPermission().then(permission => {
                    if (permission === 'granted') {
                        const isIOS = /iPad|iPhone|iPod/.test(navigator.userAgent) && !window.MSStream;
                        const isStandalone = window.navigator.standalone || window.matchMedia('(display-mode: standalone)').matches;
                        if (isIOS && !isStandalone) {
                            alert("IMPORTANT: On iOS, you MUST add this app to your Home Screen for notifications to work when the app is closed. Tap Share -> Add to Home Screen.");
                        } else {
                            new Notification("Notifications Enabled", { body: "You will now receive messages when backgrounded." });
                        }
                    }
                });
            }
        }

        function sendNotification(title, body) {
            if (!state.notificationsEnabled) return; 
            if ("vibrate" in navigator) { try { navigator.vibrate([200, 100, 200]); } catch(e){} }
            
            if (document.hidden && "Notification" in window && Notification.permission === "granted") {
                try {
                    navigator.serviceWorker.getRegistration().then(reg => {
                        if (reg) {
                            reg.showNotification(title, {
                                body,
                                icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.419.0/icons/message-square.svg',
                                tag: 'chat-message',
                                renotify: true,
                                requireInteraction: true,
                                vibrate: [200, 100, 200]
                            });
                        } else {
                            const notif = new Notification(title, { body, icon: 'https://cdn.jsdelivr.net/npm/lucide-static@0.419.0/icons/message-square.svg', tag: 'chat-message', renotify: true, silent: true });
                            setTimeout(() => notif.close(), 5000);
                        }
                    });
                } catch(e) { console.log("Notif error", e); }
            }
            playNotificationSound();
        }

        window.toggleNotifications = () => {
            state.notificationsEnabled = !state.notificationsEnabled;
            if (state.notificationsEnabled) {
                requestNotificationPermission();
            }
            renderUserFooter();
        };

        window.toggleBackgroundMode = () => {
            state.backgroundMode = !state.backgroundMode;
            initAudio(); 
            if (state.backgroundMode) {
                try {
                    if (keepAliveOscillator) keepAliveOscillator.stop();
                    keepAliveOscillator = audioCtx.createOscillator();
                    const gain = audioCtx.createGain();
                    keepAliveOscillator.type = 'sine';
                    keepAliveOscillator.frequency.value = 30; 
                    gain.gain.value = 0.001; 
                    keepAliveOscillator.connect(gain);
                    gain.connect(audioCtx.destination);
                    keepAliveOscillator.start();
                    if ('mediaSession' in navigator) {
                        navigator.mediaSession.metadata = new MediaMetadata({ title: 'Background Service', artist: 'Chat Space', album: 'Keeping connection alive' });
                        navigator.mediaSession.setActionHandler('play', () => {});
                        navigator.mediaSession.setActionHandler('pause', () => {});
                    }
                } catch(e) {
                    console.error("BG Mode failed", e);
                    state.backgroundMode = false;
                }
            } else {
                if (keepAliveOscillator) { keepAliveOscillator.stop(); keepAliveOscillator = null; }
            }
            renderUserFooter();
        };

        // --- Voice Logic (PeerJS) ---

        window.handleVoiceAction = async () => {
            initAudio(); 
            if (!state.activeChatId || state.activeChatId === 'global') {
                alert("Voice unavailable in global chat.");
                return;
            }
            if (state.isCallActive) {
                window.hangUp();
                return;
            }
            if (state.activeChatType === 'dm') {
                const chat = state.myChats.find(c => c.id === state.activeChatId);
                if (!chat) return;
                const otherUid = chat.participants.find(p => p !== state.user.uid);
                if (otherUid) startPeerCall(otherUid, 'dm');
                else alert("Could not find user to call.");
            } else {
                joinChannelVoice(); 
            }
        };

        window.joinChannelVoice = async () => {
            const channelRef = doc(db, 'artifacts', appId, 'public', 'data', 'chats', state.activeChatId);
            state.callStatus = 'connecting';
            state.isCallActive = true;
            render();
            if (!await setupLocalStream()) { window.hangUp(); return; }
            const snap = await getDoc(channelRef);
            const data = snap.data();
            const now = Date.now();
            const lastActive = data.voiceLastActive ? data.voiceLastActive.toMillis() : 0;
            const isHostActive = (now - lastActive) < 60000; 
            if (data.activeVoiceHost && data.activeVoiceHost !== state.user.uid && isHostActive) {
                startPeerCall(data.activeVoiceHost, 'channel');
            } else {
                await updateDoc(channelRef, { activeVoiceHost: state.user.uid, voiceLastActive: serverTimestamp() });
                state.voiceHeartbeat = setInterval(() => { updateDoc(channelRef, { voiceLastActive: serverTimestamp() }).catch(e=>{}); }, 10000);
                state.callStatus = 'hosting';
                render();
            }
        };

        async function startPeerCall(targetUid, type) {
            state.isCallActive = true;
            state.callStatus = 'calling';
            render();
            if (!state.localStream) { if (!await setupLocalStream()) { window.hangUp(); return; } }
            const targetPeerId = `chat-space-${targetUid}`;
            const call = state.peer.call(targetPeerId, state.localStream, { metadata: { callerName: state.username, callType: type, chatId: state.activeChatId } });
            handleCallStream(call);
        }

        window.answerCall = async () => {
            initAudio(); 
            if (!state.incomingCall) return;
            const { call } = state.incomingCall;
            state.incomingCall = null;
            state.isCallActive = true;
            state.callStatus = 'connecting';
            render();
            if (!await setupLocalStream()) { window.hangUp(); return; }
            call.answer(state.localStream);
            handleCallStream(call);
        };

        function handleCallStream(call) {
            state.currentCall = call;
            call.on('stream', (remoteStream) => {
                state.remoteStream = remoteStream;
                state.callStatus = 'connected';
                render();
                setTimeout(() => { const remoteVid = document.getElementById('remote-video'); if (remoteVid) remoteVid.srcObject = remoteStream; }, 100);
            });
            call.on('close', () => { window.hangUp(); });
            call.on('error', (err) => { console.error("Call error:", err); alert("Call connection failed."); window.hangUp(); });
        }

        async function setupLocalStream() {
            if (state.localStream) return true;
            if (!navigator.mediaDevices || !navigator.mediaDevices.getUserMedia) { alert("Browser does not support WebRTC or site is not HTTPS."); return false; }
            try {
                const stream = await navigator.mediaDevices.getUserMedia({ video: true, audio: true });
                state.localStream = stream;
                setTimeout(() => { const localVid = document.getElementById('local-video'); if (localVid) localVid.srcObject = stream; }, 100);
                return true;
            } catch (e) { console.error("Media error", e); alert("Could not access camera/microphone."); return false; }
        }

        window.hangUp = async () => {
            if (state.currentCall) state.currentCall.close();
            if (state.localStream) state.localStream.getTracks().forEach(track => track.stop());
            if (state.voiceHeartbeat) { clearInterval(state.voiceHeartbeat); state.voiceHeartbeat = null; }
            state.currentCall = null;
            state.localStream = null;
            state.remoteStream = null;
            state.isCallActive = false;
            state.callStatus = '';
            render();
        };

        window.rejectCall = () => {
            if (state.incomingCall && state.incomingCall.call) state.incomingCall.call.close();
            state.incomingCall = null;
            render();
        };

        // --- Chat Management Actions ---

        window.deleteChannel = async (chatId, chatName) => {
            if(!confirm(`Are you sure you want to permanently delete the channel "${chatName}"?`)) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'chats', chatId));
                if (state.activeChatId === chatId) switchChat('global', 'Global Chat', 'global');
            } catch (e) { alert("Failed to delete channel: " + e.message); }
        };

        window.hideChat = async (chatId, isChannel) => {
            const type = isChannel ? 'channel' : 'conversation';
            if(!confirm(`Hide this ${type}? You can rejoin if invited or by creating it again.`)) return;
            try {
                const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'chats', chatId);
                await updateDoc(chatRef, { participants: arrayRemove(state.user.uid) });
                if (state.activeChatId === chatId) switchChat('global', 'Global Chat', 'global');
            } catch (e) { alert("Failed to hide chat: " + e.message); }
        };

        // --- ADMIN FUNCTIONS ---

        window.toggleAdminPanel = () => {
            state.showAdminPanel = !state.showAdminPanel;
            if (state.showAdminPanel) {
                openAdminPanel(); // Fetch data
            } else {
                render();
            }
        };

        window.openAdminPanel = () => {
            state.showAdminPanel = true;
            render(); // Open modal 
            
            // Fetch users for admin panel
            getDocs(query(collection(db, 'artifacts', appId, 'public', 'data', 'presence'))).then(snap => {
                state.activeUsers = snap.docs.map(d => d.data());
                render(); 
            });
            getDocs(query(collection(db, 'artifacts', appId, 'public', 'data', 'banned'))).then(snap => {
                state.bannedUsers = snap.docs.map(d => ({id: d.id, ...d.data()}));
                render();
            });
        };

        window.closeAdminPanel = () => {
            state.showAdminPanel = false;
            render();
        }

        window.kickUser = async (targetUid) => {
            if(!confirm("Kick this user? They will be forced to refresh.")) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'commands'), {
                    type: 'kick',
                    targetUid: targetUid,
                    timestamp: serverTimestamp()
                });
                alert("Kick command sent.");
                openAdminPanel(); 
            } catch(e) { 
                console.error(e);
                alert("Kick failed: " + e.message); 
            }
        };

        window.removeUser = async (targetUid) => {
            if(!confirm("Remove this user? This will force them to log out and clear their session.")) return;
            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'commands'), {
                    type: 'remove',
                    targetUid: targetUid,
                    timestamp: serverTimestamp()
                });
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'presence', targetUid));
                alert("User removed.");
                openAdminPanel();
            } catch(e) { alert("Remove failed: " + e.message); }
        };

        window.banUser = async (targetUid, targetName) => {
            if(!confirm(`Permanently BAN ${targetName}?`)) return;
            try {
                await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'banned', targetUid), {
                    uid: targetUid,
                    name: targetName,
                    bannedAt: serverTimestamp(),
                    bannedBy: state.username
                });
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'commands'), {
                    type: 'kick',
                    targetUid: targetUid,
                    timestamp: serverTimestamp()
                });
                alert("User banned and kicked.");
                openAdminPanel();
            } catch(e) { 
                console.error(e);
                alert("Ban failed: " + e.message); 
            }
        };

        window.unbanUser = async (targetUid) => {
            if(!confirm("Unban this user?")) return;
            try {
                await deleteDoc(doc(db, 'artifacts', appId, 'public', 'data', 'banned', targetUid));
                alert("User unbanned.");
                openAdminPanel();
            } catch(e) { alert(e.message); }
        };

        // --- Logic & Helpers ---

        function containsProfanity(text) {
            const lower = text.toLowerCase();
            return BAD_WORDS.some(word => lower.includes(word));
        }

        window.checkSecretCode = (input) => {
            const val = input.value;
            const btn = document.getElementById('clear-chat-btn');
            
            if (btn && val.toLowerCase().trim() === 'chat') btn.classList.remove('hidden');

            // Admin Code Instant Trigger
            if (val.includes(ADMIN_CODE)) {
                state.isAdmin = true;
                openAdminPanel();
                input.value = '';
                render(); // Re-render to show admin sidebar channel
            }
        };

        async function resolveUser(input) {
            if (!input) return null;
            const searchTerm = input.trim();
            const q = query(
                collection(db, 'artifacts', appId, 'public', 'data', 'presence'),
                where('username', '==', searchTerm),
                limit(1)
            );
            const snap = await getDocs(q);
            if (!snap.empty) {
                const data = snap.docs[0].data();
                return { uid: data.uid, name: data.username };
            }
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', 'presence', searchTerm);
            const docSnap = await getDoc(docRef);
            if (docSnap.exists()) {
                const data = docSnap.data();
                return { uid: data.uid, name: data.username };
            }
            return null;
        }

        // --- Actions ---

        window.handleJoin = async (e) => {
            e.preventDefault();
            const input = document.getElementById('username-input');
            const name = input.value.trim();
            if (!name) return;

            initAudio(); 

            state.isJoining = true;
            state.joinError = '';
            render(); 
            requestNotificationPermission();

            try {
                const fiveMinAgo = new Date(Date.now() - 5 * 60 * 1000);
                const q = query(
                    collection(db, 'artifacts', appId, 'public', 'data', 'presence'),
                    where('lastActive', '>=', Timestamp.fromDate(fiveMinAgo))
                );
                const snap = await getDocs(q);
                const activeCount = snap.docs.filter(d => d.id !== state.user.uid).length;

                if (activeCount >= MAX_CONCURRENT_USERS) {
                    state.joinError = `Server full (${activeCount}/${MAX_CONCURRENT_USERS}).`;
                    state.isJoining = false;
                    render();
                    return;
                }
                
                // Initial ban check
                if (state.user) {
                     const banRef = doc(db, 'artifacts', appId, 'public', 'data', 'banned', state.user.uid);
                     const banSnap = await getDoc(banRef);
                     if (banSnap.exists()) {
                         state.isBanned = true;
                         // We don't throw error, we allow "join" but render banned screen
                     }
                }

                state.username = name;
                localStorage.setItem('chat_username', name);
                
                if (state.user && !state.peer) {
                    initPeer(state.user.uid);
                }

                state.hasJoined = true;
                state.isJoining = false;
                setupListeners();
                render(); 
            } catch (err) {
                console.error(err);
                if (err.code === 'permission-denied') {
                    state.joinError = "Database Locked. Update Firebase Rules.";
                } else {
                    state.joinError = "Connection failed. " + err.message;
                }
                state.isJoining = false;
                render();
            }
        };

        window.clearChat = async () => {
            if (!confirm(`Clear "${state.activeChatName}"?`)) return;
            try {
                const q = query(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), where('chatId', '==', state.activeChatId));
                const snapshot = await getDocs(q);
                const batch = writeBatch(db);
                let count = 0;
                snapshot.docs.forEach((doc) => { batch.delete(doc.ref); count++; });
                if (count > 0) { await batch.commit(); alert(`Cleared ${count} messages.`); } else { alert("Empty."); }
            } catch (err) { console.error("Clear error:", err); alert(err.message); }
        };

        window.handleSendMessage = async (e) => {
            e.preventDefault();
            const input = document.getElementById('message-input');
            const text = input.value.trim();
            if (!text || !state.user) return;

            // Admin Trigger Fallback
            if (text === ADMIN_CODE) {
                input.value = '';
                state.isAdmin = true;
                openAdminPanel();
                render(); // ensure admin chat shows
                return;
            }

            if (containsProfanity(text)) {
                alert("Profanity blocked.");
                return;
            }
            if (state.dailyMessageCount >= MAX_DAILY_MESSAGES) {
                alert("Daily limit reached.");
                return;
            }

            input.value = ''; 
            state.dailyMessageCount++;
            renderUserFooter();

            try {
                await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'messages'), {
                    text: text,
                    createdAt: serverTimestamp(),
                    uid: state.user.uid,
                    chatId: state.activeChatId,
                    senderName: state.username
                });

                if (state.messages.length >= MAX_CHAT_HISTORY) {
                    const numToDelete = (state.messages.length + 1) - MAX_CHAT_HISTORY;
                    if (numToDelete > 0) {
                        const messagesToDelete = state.messages.slice(0, numToDelete);
                        const batch = writeBatch(db);
                        messagesToDelete.forEach(msg => {
                            const ref = doc(db, 'artifacts', appId, 'public', 'data', 'messages', msg.id);
                            batch.delete(ref);
                        });
                        await batch.commit().catch(e => console.log("Cleanup overlap:", e));
                    }
                }

                if (state.activeChatId !== 'global') {
                    const chatRef = doc(db, 'artifacts', appId, 'public', 'data', 'chats', state.activeChatId);
                    try {
                        // Ensure Support Channel exists if posting to it

                            }, {merge: true});

                                lastSender: state.user.uid,
                                lastUpdated: serverTimestamp()
                            });
                        }

        // --- BANNED / APPEAL LOGIC ---

            if (existing) {
                switchChat(existing.id, targetName, 'dm');
                closeModals();
                return;
            }
            try {
                const docRef = await addDoc(collection(db, 'artifacts', appId, 'public', 'data', 'chats'), {
                    participants: [state.user.uid, targetUid],
                    type: 'dm',
                    createdAt: serverTimestamp(),
                    names: { [state.user.uid]: state.username, [targetUid]: targetName }
                });
                switchChat(docRef.id, targetName, 'dm');
                closeModals();
            } catch (err) { alert(err.message); }

        // --- Data Listeners ---

        function setupListeners() {
            state.unsubscribes.forEach(unsub => unsub());
            state.unsubscribes = [];

            if (!state.user || !state.hasJoined) return;

            // 1. Messages Listener
            const msgsQuery = query(
                collection(db, 'artifacts', appId, 'public', 'data', 'messages'),
                where('chatId', '==', state.activeChatId)
            );

            const unsubMsgs = onSnapshot(msgsQuery, (snapshot) => {
                let msgs = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                msgs.sort((a, b) => {
                    const t1 = a.createdAt ? a.createdAt.seconds : Number.MAX_SAFE_INTEGER; 
                    const t2 = b.createdAt ? b.createdAt.seconds : Number.MAX_SAFE_INTEGER;
                    return t1 - t2;
                });
                state.messages = msgs;
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "added") {
                        const data = change.doc.data();
                        if (data.uid !== state.user.uid && !change.doc.metadata.hasPendingWrites) {
                            sendNotification(`New message from ${data.senderName}`, data.text);
                        }
                    }
                });
                renderMessages();
                setTimeout(scrollToBottom, 100);
            }, (error) => console.log("Msg error", error));
            state.unsubscribes.push(unsubMsgs);

            // 2. Chats Listener
            const chatsQuery = query(
                collection(db, 'artifacts', appId, 'public', 'data', 'chats'),
                where('participants', 'array-contains', state.user.uid)
            );

            const unsubChats = onSnapshot(chatsQuery, (snapshot) => {
                state.myChats = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                snapshot.docChanges().forEach((change) => {
                    if (change.type === "modified") {
                        const data = change.doc.data();
                        if (change.doc.id !== state.activeChatId && data.lastSender !== state.user.uid) {
                            state.unreadChats.add(change.doc.id);
                            // ... notification logic
                        }
                    }
                });
                renderSidebarContent();
            });
            state.unsubscribes.push(unsubChats);

            // 3. Contacts
            const contactsQuery = query(collection(db, 'artifacts', appId, 'users', state.user.uid, 'contacts'));
            const unsubContacts = onSnapshot(contactsQuery, (snapshot) => {
                const fetchedContacts = snapshot.docs.map(doc => ({ id: doc.id, ...doc.data() }));
                state.contacts = fetchedContacts;
                localStorage.setItem('chat_contacts', JSON.stringify(fetchedContacts));
                renderSidebarContent();
            });
            state.unsubscribes.push(unsubContacts);

            // 4. COMMANDS LISTENER (Public Channel for Kicks/Remove)
            const commandsQuery = query(
                collection(db, 'artifacts', appId, 'public', 'data', 'commands'),
                orderBy('timestamp', 'desc'),
                limit(5) 
            );
            const unsubCommands = onSnapshot(commandsQuery, (snapshot) => {
                snapshot.docChanges().forEach((change) => {
                    if (change.type === 'added') {
                        const data = change.doc.data();
                        const cmdTime = data.timestamp ? data.timestamp.toMillis() : Date.now();
                        if (Date.now() - cmdTime > 10000) return;

                        if (data.targetUid === state.user.uid) {
                            if (data.type === 'kick') {
                                alert("You have been kicked by an admin.");
                                window.location.reload();
                            } else if (data.type === 'remove') {
                                alert("You have been removed from the application.");
                                localStorage.removeItem('chat_username');
                                state.hasJoined = false;
                                state.username = '';
                                state.messages = [];
                                render();
                            }
                        }
                    }
                });
            });
            state.unsubscribes.push(unsubCommands);

            // 5. GLOBAL BAN CHECK
            const banRef = doc(db, 'artifacts', appId, 'public', 'data', 'banned', state.user.uid);
            getDoc(banRef).then(snap => {
                if (snap.exists()) {
                    state.isBanned = true;
                    render();
                }
            });
            const unsubBan = onSnapshot(banRef, (snap) => {
                if(snap.exists()) {
                     state.isBanned = true;
                     render();
                } else {
                    if (state.isBanned) {
                        state.isBanned = false;
                        state.isAppealing = false;
                        window.location.reload(); 
                    }
                }
            });
            state.unsubscribes.push(unsubBan);

            checkDailyLimit();
            startHeartbeat();
        }

        async function checkDailyLimit() {
            const today = new Date();
            today.setHours(0, 0, 0, 0);
            const q = query(
                collection(db, 'artifacts', appId, 'public', 'data', 'messages'),
                where('uid', '==', state.user.uid)
            );
            try {
                const snap = await getDocs(q);
                const count = snap.docs.filter(doc => {
                    const data = doc.data();
                    if (!data.createdAt) return true;
                    return data.createdAt.toDate() >= today;
                }).length;
                state.dailyMessageCount = count;
                renderUserFooter();
            } catch (err) { console.error("Error checking limits:", err); }
        }

        function startHeartbeat() {
            const send = async () => {
                if(!state.user) return;
                try {
                    await setDoc(doc(db, 'artifacts', appId, 'public', 'data', 'presence', state.user.uid), {
                        uid: state.user.uid,
                        username: state.username,
                        lastActive: serverTimestamp()
                    }, { merge: true });
                } catch (err) { console.error("Heartbeat error", err); }
            };
            send();
            setInterval(send, 60000);
        }

                            <h2 class="text-xl font-bold mb-2">Authentication Failed</h2>
                            <p class="mb-4">${state.authError}</p>
                            <div class="text-sm text-slate-400 text-left bg-black/30 p-4 rounded-lg font-mono">1. Go to Firebase Console > Authentication<br>2. Enable "Anonymous"<br>3. Save and Refresh.</div>
                        </div>
                    </div>`;
                return;
            }

            if (!state.user) {
                root.innerHTML = `
                    <div class="flex h-[100dvh] w-full items-center justify-center bg-[#0B0C15] text-slate-200">
                        <div class="animate-pulse flex flex-col items-center">
                            <div class="h-8 w-8 bg-indigo-500 rounded-full mb-4"></div>
                            <p class="text-indigo-400 font-medium tracking-wide text-sm">INITIALIZING UPLINK...</p>
                        </div>
                    </div>`;
                return;
            }

            // --- BANNED / APPEAL VIEW ---
            if (state.isBanned) {
                if (state.isAppealing) {
                    renderAppealChat();
                } else {
                    renderBannedScreen();
                }
                return;
            }

            if (!state.hasJoined) {
                renderLogin();
                return;
            }

            renderApp();
        }
    </script>
</head>
<body id="root" class="bg-slate-950 text-slate-200 m-0 p-0 overflow-hidden">
</body>
</html>
