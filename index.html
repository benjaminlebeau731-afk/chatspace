<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chat Space</title>
  
  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          colors: {
            sidebarBg: '#121622',
            mainBg: '#080b12',
            border: '#1e2536',
            primary: '#635bff',
            primaryHover: '#524be3',
            inputBg: '#1a2030',
            textMuted: '#6b7280'
          }
        }
      }
    }
  </script>

  <!-- Lucide Icons -->
  <script src="https://unpkg.com/lucide@latest"></script>
  
  <style>
    /* Custom Scrollbar for a cleaner look */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: #1e2536;
      border-radius: 4px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: #2a344a;
    }
    .bg-pattern {
      background-image: radial-gradient(circle at 50% 50%, rgba(30, 37, 54, 0.4) 1px, transparent 1px);
      background-size: 24px 24px;
    }
  </style>
</head>
<body class="bg-mainBg text-slate-200 font-sans overflow-hidden">

  <!-- ==================== SCREENS ==================== -->

  <!-- 1. LOADING SCREEN -->
  <div id="loading-screen" class="flex h-screen w-full items-center justify-center">
    <div class="w-10 h-10 border-4 border-primary border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- 2. LOGIN SCREEN -->
  <div id="login-screen" class="hidden flex h-screen w-full items-center justify-center">
    <div class="w-full max-w-md p-10 rounded-2xl bg-sidebarBg border border-border flex flex-col items-center mx-4 text-center">
      <div class="w-16 h-16 rounded-2xl mb-8 flex items-center justify-center bg-primary shadow-xl shadow-indigo-500/20">
        <i data-lucide="message-square" class="text-white w-8 h-8"></i>
      </div>
      <h1 class="text-3xl font-bold text-white mb-3">Welcome Back</h1>
      <p class="text-base text-textMuted mb-10">
        Sign in with Google to access your workspace and start chatting.
      </p>
      <button id="btn-google-login" class="w-full flex items-center justify-center gap-3 bg-white hover:bg-slate-100 text-slate-900 py-3.5 rounded-xl font-bold transition-all shadow-lg active:scale-95">
        <svg class="w-5 h-5" viewBox="0 0 24 24">
          <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/>
          <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
          <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.26.81-.58z" fill="#FBBC05"/>
          <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
        </svg>
        Continue with Google
      </button>

      <button id="btn-github-login" class="w-full mt-3 flex items-center justify-center gap-3 bg-[#24292e] hover:bg-[#2f363d] text-white py-3.5 rounded-xl font-bold transition-all shadow-lg active:scale-95">
        <svg class="w-5 h-5 fill-current" viewBox="0 0 24 24">
          <path d="M12 .297c-6.63 0-12 5.373-12 12 0 5.303 3.438 9.8 8.205 11.385.6.113.82-.258.82-.577 0-.285-.01-1.04-.015-2.04-3.338.724-4.042-1.61-4.042-1.61C4.422 18.07 3.633 17.7 3.633 17.7c-1.087-.744.084-.729.084-.729 1.205.084 1.838 1.236 1.838 1.236 1.07 1.835 2.809 1.305 3.495.998.108-.776.417-1.305.76-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.465-2.38 1.235-3.22-.135-.303-.54-1.523.105-3.176 0 0 1.005-.322 3.3 1.23.96-.267 1.98-.399 3-.405 1.02.006 2.04.138 3 .405 2.28-1.552 3.285-1.23 3.285-1.23.645 1.653.24 2.873.12 3.176.765.84 1.23 1.91 1.23 3.22 0 4.61-2.805 5.625-5.475 5.92.42.36.81 1.096.81 2.22 0 1.606-.015 2.896-.015 3.286 0 .315.21.69.825.57C20.565 22.092 24 17.592 24 12.297c0-6.627-5.373-12-12-12"/>
        </svg>
        Continue with GitHub
      </button>
    </div>
  </div>

  <!-- 3. PROFILE SETUP SCREEN -->
  <div id="profile-screen" class="hidden flex h-screen w-full items-center justify-center">
    <div class="w-full max-w-md p-8 rounded-2xl bg-sidebarBg border border-border flex flex-col items-center mx-4">
      <img id="profile-setup-img" src="" alt="User profile" class="w-20 h-20 rounded-full border-4 border-indigo-500/30 mb-6 shadow-xl" />
      <h1 class="text-2xl font-bold text-white mb-2">Set up your profile</h1>
      <p id="profile-setup-desc" class="text-sm text-textMuted mb-8 text-center">
        Choose a unique username to be identified by in the workspace.
      </p>
      
      <form id="form-profile-setup" class="w-full">
        <input 
          id="input-username"
          type="text" 
          placeholder="Username..."
          class="w-full bg-inputBg border border-transparent focus:border-slate-600 rounded-xl px-4 py-3.5 text-slate-200 placeholder-slate-500 mb-6 focus:outline-none transition-colors"
          required
        />
        <button 
          type="submit"
          class="w-full py-3.5 rounded-xl font-medium text-white transition-all bg-primary hover:bg-primaryHover shadow-md"
        >
          Finish Setup
        </button>
        <button 
          type="button"
          id="btn-profile-logout"
          class="w-full mt-4 text-sm text-slate-500 hover:text-white transition-colors"
        >
          Cancel and Logout
        </button>
      </form>
    </div>
  </div>

  <!-- 4. MAIN APP SCREEN -->
  <div id="app-screen" class="hidden flex h-screen w-full overflow-hidden">
    
    <!-- Mobile Sidebar Overlay -->
    <div id="mobile-overlay" class="fixed inset-0 bg-black/50 z-40 hidden lg:hidden"></div>

    <!-- Sidebar -->
    <div id="sidebar" class="fixed inset-y-0 left-0 z-50 w-72 transform -translate-x-full transition-transform duration-300 ease-in-out lg:relative lg:translate-x-0 flex flex-col bg-sidebarBg border-r border-border">
      <div class="flex items-center justify-between p-4 border-b border-border h-16">
        <div class="flex items-center gap-3">
          <div class="w-8 h-8 rounded-lg flex items-center justify-center bg-primary">
            <i data-lucide="message-square" class="text-white w-4 h-4"></i>
          </div>
          <span class="font-bold text-lg tracking-wide text-white">Chat Space</span>
        </div>
        <div class="flex items-center gap-1">
          <button onclick="openModal('contact')" class="p-1.5 rounded-lg text-slate-400 hover:text-white hover:bg-[#1e2536] transition-colors" title="Add Contact">
            <i data-lucide="user-plus" class="w-4 h-4"></i>
          </button>
          <button id="btn-close-sidebar" class="lg:hidden p-1.5 text-slate-400 hover:text-white">
            <i data-lucide="x" class="w-5 h-5"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center p-2 border-b border-border">
        <button id="tab-channels" class="flex-1 py-1.5 px-3 rounded-md text-sm font-medium transition-colors bg-[#1e2536] text-white">Channels</button>
        <button id="tab-dms" class="flex-1 py-1.5 px-3 rounded-md text-sm font-medium transition-colors text-slate-400 hover:text-slate-300">DMs</button>
      </div>

      <div class="flex items-center justify-between px-4 py-3">
        <span id="sidebar-list-title" class="text-xs font-bold text-slate-500 uppercase tracking-wider">All Channels</span>
        <button id="btn-add-chat" class="text-slate-400 hover:text-white transition-colors">
          <i data-lucide="plus" class="w-4 h-4"></i>
        </button>
      </div>

      <div id="chat-list" class="flex-1 overflow-y-auto px-3 pb-3 space-y-1">
        <!-- Chat items injected here -->
      </div>

      <div class="p-4 border-t border-border flex flex-col gap-3 mt-auto bg-[#0f121d]">
        <div class="flex items-center justify-between">
          <div class="flex items-center gap-3 cursor-pointer min-w-0">
            <img id="sidebar-user-img" src="" alt="User" class="w-9 h-9 flex-shrink-0 rounded-full border border-indigo-500/20" />
            <div class="flex flex-col min-w-0">
              <span id="sidebar-username" class="font-semibold text-sm text-slate-200 truncate"></span>
              <span id="sidebar-contacts-count" class="text-xs text-slate-500 truncate">0 contacts</span>
            </div>
          </div>
          <button id="btn-app-logout" class="text-slate-400 hover:text-red-400 transition-colors flex-shrink-0" title="Sign out">
            <i data-lucide="log-out" class="w-4 h-4"></i>
          </button>
        </div>
      </div>
    </div>

    <!-- Main Chat Area -->
    <div class="flex-1 flex flex-col h-full min-w-0 bg-pattern relative">
      <header class="flex items-center justify-between px-6 h-16 border-b border-border flex-shrink-0 backdrop-blur-md bg-[#080b12]/90 z-10">
        <div class="flex items-center gap-4 min-w-0">
          <button id="btn-open-sidebar" class="lg:hidden text-slate-400 hover:text-white flex-shrink-0">
            <i data-lucide="menu" class="w-6 h-6"></i>
          </button>
          <div class="flex flex-col min-w-0">
            <div class="flex items-center gap-2">
              <i id="header-icon" data-lucide="hash" class="text-slate-400 w-4 h-4"></i>
              <h1 id="header-chat-name" class="font-bold text-white text-lg leading-tight truncate">Global Chat</h1>
            </div>
            <div class="text-xs flex items-center gap-1 text-textMuted truncate">
              <i id="header-users-icon" data-lucide="users" class="w-3 h-3"></i>
              <span id="header-participants">Public Room</span>
            </div>
          </div>
        </div>
        <div class="flex items-center gap-3">
          <button id="btn-invite-channel" class="hidden p-2 rounded-lg text-slate-400 hover:text-white hover:bg-[#1e2536] transition-colors" title="Invite to Channel">
            <i data-lucide="user-plus" class="w-5 h-5"></i>
          </button>
          <button class="text-slate-400 hover:text-white lg:hidden">
            <i data-lucide="more-vertical" class="w-5 h-5"></i>
          </button>
        </div>
      </header>

      <div id="messages-container" class="flex-1 overflow-y-auto p-6 flex flex-col">
        <!-- Messages injected here -->
      </div>

      <div class="p-4 border-t border-border bg-[#080b12] z-10">
        <form id="form-send-message" class="max-w-5xl mx-auto relative flex items-center bg-inputBg rounded-xl border border-transparent focus-within:border-slate-600 transition-colors shadow-sm">
          <input 
            id="input-message"
            type="text" 
            placeholder="Message..." 
            class="w-full bg-transparent border-none text-slate-200 placeholder-slate-500 px-4 py-3.5 focus:outline-none focus:ring-0 text-sm" 
            autocomplete="off"
          />
          <button id="btn-send-msg" type="submit" class="hidden absolute right-2 p-2 rounded-lg bg-primary hover:bg-primaryHover text-white transition-all transform scale-100 hover:scale-105 shadow-md">
            <i data-lucide="send" class="w-4 h-4"></i>
          </button>
        </form>
      </div>
    </div>
  </div>

  <!-- ==================== MODALS ==================== -->
  <div id="modal-container" class="hidden fixed inset-0 bg-black/60 backdrop-blur-sm z-[60] flex items-center justify-center p-4">
    <div class="w-full max-w-md p-6 rounded-2xl bg-sidebarBg border border-border shadow-2xl flex flex-col">
      <div class="flex items-center justify-between mb-6">
        <h2 id="modal-title" class="text-xl font-bold text-white">Modal Title</h2>
        <button onclick="closeModal()" class="text-slate-400 hover:text-white transition-colors">
          <i data-lucide="x" class="w-5 h-5"></i>
        </button>
      </div>

      <form id="modal-form" class="flex flex-col gap-4">
        <div id="modal-error" class="hidden bg-red-500/10 border border-red-500/20 text-red-400 text-sm px-3 py-2 rounded-lg"></div>

        <div id="modal-input-group" class="flex flex-col gap-2">
          <label id="modal-input-label" class="text-sm text-slate-400 font-medium">Input Label</label>
          <input 
            id="modal-input"
            type="text" 
            class="w-full bg-inputBg border border-transparent focus:border-slate-600 rounded-xl px-4 py-3 text-slate-200 focus:outline-none"
          />
        </div>

        <div id="modal-invite-group" class="hidden flex-col gap-2 mt-2">
          <label class="text-sm text-slate-400 font-medium">Invite Members</label>
          <div class="flex gap-2">
            <input 
              id="modal-invite-input"
              type="text" 
              placeholder="Type username and press Enter..."
              class="flex-1 bg-inputBg border border-transparent focus:border-slate-600 rounded-xl px-4 py-3 text-slate-200 focus:outline-none"
            />
            <button 
              type="button"
              id="btn-add-invite"
              class="px-4 rounded-xl font-medium text-white transition-all bg-primary hover:bg-primaryHover"
            >
              Add
            </button>
          </div>
          <div id="modal-selected-contacts" class="flex flex-wrap gap-2 mt-3 empty:hidden">
            <!-- Selected contacts injected here -->
          </div>
        </div>

        <button 
          id="modal-submit-btn"
          type="submit"
          class="w-full py-3 mt-4 rounded-xl font-medium text-white transition-all disabled:opacity-50 disabled:cursor-not-allowed bg-primary hover:bg-primaryHover"
          disabled
        >
          Submit
        </button>
      </form>
    </div>
  </div>

  <!-- ==================== SCRIPT ==================== -->
  <script type="module">
    import { initializeApp } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-app.js';
    import { 
      getAuth, 
      onAuthStateChanged, 
      GoogleAuthProvider,
      GithubAuthProvider,
      signInWithPopup,
      signInWithCustomToken,
      signInAnonymously,
      signOut
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-auth.js';
    import { 
      getFirestore, 
      collection, 
      onSnapshot, 
      doc, 
      setDoc, 
      updateDoc, 
      getDoc 
    } from 'https://www.gstatic.com/firebasejs/11.6.1/firebase-firestore.js';

    // Firebase Config - Securely injected by the execution environment
    const firebaseConfig = JSON.parse(__firebase_config);

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);
    const googleProvider = new GoogleAuthProvider();
    const githubProvider = new GithubAuthProvider();
    
    // Use the environment's app ID for the namespace to keep data isolated
    const APP_NAMESPACE = typeof __app_id !== 'undefined' ? __app_id : "chatspace-v1";

    // Application State
    let firebaseUser = null;
    let userName = '';
    let isJoined = false;
    let knownUsers = [];
    let contacts = [];
    let allChats = {};
    let allMessages = [];
    
    let activeChatId = 'global';
    let activeTab = 'channel'; // 'channel' | 'dm'
    
    // Modal State
    let modalType = null; // 'contact', 'dm', 'channel', 'invite_to_channel'
    let selectedContacts = [];

    // Subscriptions
    let unsubChats, unsubMsgs, unsubUsers;

    // Elements
    const screens = {
      loading: document.getElementById('loading-screen'),
      login: document.getElementById('login-screen'),
      profile: document.getElementById('profile-screen'),
      app: document.getElementById('app-screen')
    };

    // Helper: Show Screen
    function showScreen(screenName) {
      Object.values(screens).forEach(el => el.classList.add('hidden'));
      screens[screenName].classList.remove('hidden');
      lucide.createIcons();
    }

    // 1. AUTHENTICATION & INITIALIZATION
    onAuthStateChanged(auth, async (user) => {
      firebaseUser = user;
      if (!user) {
        isJoined = false;
        userName = '';
        if (unsubChats) unsubChats();
        if (unsubMsgs) unsubMsgs();
        if (unsubUsers) unsubUsers();
        showScreen('login');
      } else {
        showScreen('loading');
        try {
          const profileRef = doc(db, 'artifacts', APP_NAMESPACE, 'users', user.uid, 'profile', 'info');
          const profileSnap = await getDoc(profileRef);
          if (profileSnap.exists() && profileSnap.data().username) {
            userName = profileSnap.data().username;
            isJoined = true;
            setupApp();
          } else {
            document.getElementById('profile-setup-img').src = user.photoURL || 'https://via.placeholder.com/80';
            document.getElementById('profile-setup-desc').textContent = `Hi ${user.displayName || 'there'}! Choose a unique username.`;
            showScreen('profile');
          }
        } catch (error) {
          console.error("Profile check error:", error);
          showScreen('login');
        }
      }
    });

    // 2. FIRESTORE LISTENERS
    function setupApp() {
      showScreen('app');
      document.getElementById('sidebar-user-img').src = firebaseUser.photoURL || 'https://via.placeholder.com/40';
      document.getElementById('sidebar-username').textContent = userName;
      document.getElementById('sidebar-contacts-count').textContent = `${contacts.length} contacts`;

      unsubChats = onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'chats'), (snapshot) => {
        const fetchedChats = {};
        snapshot.forEach(doc => { fetchedChats[doc.id] = doc.data(); });
        
        if (!fetchedChats['global']) {
          const globalChat = { id: 'global', name: 'Global Chat', type: 'channel', participants: ['All'] };
          fetchedChats['global'] = globalChat;
          setDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'chats', 'global'), globalChat);
        }
        allChats = fetchedChats;
        renderSidebar();
        renderHeader();
      });

      unsubMsgs = onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'messages'), (snapshot) => {
        allMessages = [];
        snapshot.forEach(doc => { allMessages.push({ id: doc.id, ...doc.data() }); });
        renderMessages();
      });

      unsubUsers = onSnapshot(collection(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'users'), (snapshot) => {
        knownUsers = [];
        snapshot.forEach(doc => { knownUsers.push(doc.id); });
      });
    }

    // 3. EVENT LISTENERS
    document.getElementById('btn-google-login').addEventListener('click', () => {
      showScreen('loading');
      signInWithPopup(auth, googleProvider).catch((error) => {
        console.error("Google Sign-In Error:", error);
        showScreen('login');
      });
    });

    document.getElementById('btn-github-login').addEventListener('click', () => {
      showScreen('loading');
      signInWithPopup(auth, githubProvider).catch((error) => {
        console.error("GitHub Sign-In Error:", error);
        showScreen('login');
      });
    });

    document.querySelectorAll('#btn-profile-logout, #btn-app-logout').forEach(btn => {
      btn.addEventListener('click', () => signOut(auth));
    });

    document.getElementById('form-profile-setup').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('input-username').value.trim();
      if (name && firebaseUser) {
        document.querySelector('#form-profile-setup button[type="submit"]').disabled = true;
        try {
          await setDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'users', name.toLowerCase()), {
            username: name,
            joinedAt: Date.now(),
            photoURL: firebaseUser.photoURL
          });
          await setDoc(doc(db, 'artifacts', APP_NAMESPACE, 'users', firebaseUser.uid, 'profile', 'info'), {
            username: name
          });
          userName = name;
          isJoined = true;
          setupApp();
        } catch (error) {
          console.error("Error setting username", error);
        }
      }
    });

    // Sidebar Toggles
    const sidebar = document.getElementById('sidebar');
    const mobileOverlay = document.getElementById('mobile-overlay');
    
    document.getElementById('btn-open-sidebar').addEventListener('click', () => {
      sidebar.classList.remove('-translate-x-full');
      mobileOverlay.classList.remove('hidden');
    });

    function closeSidebarMobile() {
      sidebar.classList.add('-translate-x-full');
      mobileOverlay.classList.add('hidden');
    }
    
    document.getElementById('btn-close-sidebar').addEventListener('click', closeSidebarMobile);
    mobileOverlay.addEventListener('click', closeSidebarMobile);

    // Tabs
    const tabChannels = document.getElementById('tab-channels');
    const tabDMs = document.getElementById('tab-dms');

    function setActiveTab(tab) {
      activeTab = tab;
      if (tab === 'channel') {
        tabChannels.className = "flex-1 py-1.5 px-3 rounded-md text-sm font-medium transition-colors bg-[#1e2536] text-white";
        tabDMs.className = "flex-1 py-1.5 px-3 rounded-md text-sm font-medium transition-colors text-slate-400 hover:text-slate-300";
        document.getElementById('sidebar-list-title').textContent = 'All Channels';
      } else {
        tabDMs.className = "flex-1 py-1.5 px-3 rounded-md text-sm font-medium transition-colors bg-[#1e2536] text-white";
        tabChannels.className = "flex-1 py-1.5 px-3 rounded-md text-sm font-medium transition-colors text-slate-400 hover:text-slate-300";
        document.getElementById('sidebar-list-title').textContent = 'Direct Messages';
      }
      renderSidebar();
    }
    
    tabChannels.addEventListener('click', () => setActiveTab('channel'));
    tabDMs.addEventListener('click', () => setActiveTab('dm'));

    // Messaging
    const msgInput = document.getElementById('input-message');
    const btnSendMsg = document.getElementById('btn-send-msg');
    
    msgInput.addEventListener('input', (e) => {
      if (e.target.value.trim()) {
        btnSendMsg.classList.remove('hidden');
      } else {
        btnSendMsg.classList.add('hidden');
      }
    });

    document.getElementById('form-send-message').addEventListener('submit', async (e) => {
      e.preventDefault();
      const text = msgInput.value.trim();
      if (!text || !firebaseUser) return;
      
      const msgId = `msg_${Date.now()}_${Math.random().toString(36).substr(2, 9)}`;
      const msgRef = doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'messages', msgId);
      
      msgInput.value = '';
      btnSendMsg.classList.add('hidden');

      await setDoc(msgRef, {
        chatId: activeChatId,
        text: text,
        sender: userName,
        createdAt: Date.now(),
        timestamp: new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }),
        senderPhoto: firebaseUser.photoURL
      });
    });

    // 4. RENDERING FUNCTIONS
    window.selectChat = function(id) {
      activeChatId = id;
      renderSidebar();
      renderHeader();
      renderMessages();
      closeSidebarMobile();
    }

    function renderSidebar() {
      const chatList = document.getElementById('chat-list');
      const filteredChats = Object.values(allChats).filter(c => c.type === activeTab);
      
      if (filteredChats.length === 0) {
        chatList.innerHTML = `
          <div class="px-2 py-4 text-sm text-slate-500 text-center">
            No ${activeTab === 'channel' ? 'channels' : 'messages'} found.<br />
            <button onclick="openModal('${activeTab}')" class="text-indigo-400 hover:underline mt-2">Create one now</button>
          </div>
        `;
        return;
      }

      chatList.innerHTML = filteredChats.map(chat => {
        const isActive = activeChatId === chat.id;
        const iconName = chat.type === 'channel' ? 'hash' : 'at-sign';
        const subtitle = chat.type === 'channel' && chat.participants.length > 0 
          ? `<span class="text-xs truncate ${isActive ? 'text-indigo-200' : 'text-slate-500'}">
              ${chat.participants.includes('All') ? 'Public room' : `${chat.participants.length + 1} members`}
             </span>`
          : '';

        return `
          <div onclick="selectChat('${chat.id}')" class="flex items-center gap-3 p-3 rounded-xl cursor-pointer transition-colors ${isActive ? 'bg-primary shadow-md' : 'hover:bg-[#1e2536]'}">
            <div class="w-8 h-8 rounded-md flex items-center justify-center flex-shrink-0 ${isActive ? 'bg-white/20' : 'bg-[#1a2030]'}">
              <i data-lucide="${iconName}" class="${isActive ? 'text-white' : 'text-slate-400'} w-4 h-4"></i>
            </div>
            <div class="flex flex-col min-w-0 flex-1">
              <span class="font-semibold text-sm truncate ${isActive ? 'text-white' : 'text-slate-300'}">${chat.name}</span>
              ${subtitle}
            </div>
          </div>
        `;
      }).join('');
      
      lucide.createIcons();
    }

    function renderHeader() {
      const activeChat = allChats[activeChatId] || { id: 'global', name: 'Global Chat', type: 'channel', participants: ['All'] };
      
      document.getElementById('header-chat-name').textContent = activeChat.name;
      const headerIcon = document.getElementById('header-icon');
      const headerUsersIcon = document.getElementById('header-users-icon');
      const headerParticipants = document.getElementById('header-participants');
      const btnInvite = document.getElementById('btn-invite-channel');
      
      if (activeChat.type === 'channel') {
        headerIcon.setAttribute('data-lucide', 'hash');
        headerUsersIcon.classList.remove('hidden');
        headerParticipants.textContent = activeChat.participants.includes('All') ? 'Public Room' : `${activeChat.participants.join(', ')}, You`;
        
        if (activeChatId !== 'global') {
          btnInvite.classList.remove('hidden');
        } else {
          btnInvite.classList.add('hidden');
        }
      } else {
        headerIcon.setAttribute('data-lucide', 'at-sign');
        headerUsersIcon.classList.add('hidden');
        headerParticipants.textContent = 'Direct Message';
        btnInvite.classList.add('hidden');
      }

      msgInput.placeholder = `Message ${activeChat.type === 'channel' ? '#' : '@'}${activeChat.name}...`;
      lucide.createIcons();
    }

    function renderMessages() {
      const container = document.getElementById('messages-container');
      const activeChat = allChats[activeChatId] || { id: 'global', name: 'Global Chat', type: 'channel' };
      
      const currentMessages = allMessages
        .filter(m => m.chatId === activeChatId)
        .sort((a, b) => a.createdAt - b.createdAt);

      if (currentMessages.length === 0) {
        container.innerHTML = `
          <div class="flex-1 flex flex-col items-center justify-center text-center max-w-sm mx-auto h-full">
            <div class="w-16 h-16 rounded-2xl border-2 border-dashed border-border flex items-center justify-center mb-4 bg-sidebarBg">
              <i data-lucide="${activeChat.type === 'channel' ? 'hash' : 'message-square'}" class="text-textMuted w-7 h-7"></i>
            </div>
            <h3 class="text-white font-semibold mb-2">Welcome to the beginning!</h3>
            <p class="text-textMuted">This is the start of your ${activeChat.type === 'channel' ? 'channel history' : `conversation with ${activeChat.name}`}. Say hi!</p>
          </div>
        `;
      } else {
        container.innerHTML = `
          <div class="flex flex-col gap-6 w-full max-w-4xl mx-auto">
            ${currentMessages.map(msg => {
              const isMe = msg.sender === userName;
              return `
                <div class="flex gap-4 ${isMe ? 'flex-row-reverse' : ''}">
                  <img src="${msg.senderPhoto || 'https://via.placeholder.com/40'}" class="w-10 h-10 rounded-full flex-shrink-0 border ${isMe ? 'border-indigo-500/50' : 'border-slate-700'}" />
                  <div class="flex flex-col max-w-[80%] ${isMe ? 'items-end' : 'items-start'}">
                    <div class="flex items-baseline gap-2 mb-1 ${isMe ? 'flex-row-reverse' : ''}">
                      <span class="font-medium text-slate-200">${isMe ? 'You' : msg.sender}</span>
                      <span class="text-xs text-slate-500">${msg.timestamp}</span>
                    </div>
                    <div class="px-4 py-2 rounded-2xl text-white inline-block shadow-sm ${isMe ? 'bg-primary rounded-tr-none' : 'bg-[#1e2536] rounded-tl-none border border-border'}">${msg.text}</div>
                  </div>
                </div>
              `;
            }).join('')}
          </div>
        `;
      }
      lucide.createIcons();
      container.scrollTop = container.scrollHeight;
    }

    // 5. MODAL LOGIC
    const modalContainer = document.getElementById('modal-container');
    const modalTitle = document.getElementById('modal-title');
    const modalError = document.getElementById('modal-error');
    const modalInputGroup = document.getElementById('modal-input-group');
    const modalInputLabel = document.getElementById('modal-input-label');
    const modalInput = document.getElementById('modal-input');
    const modalInviteGroup = document.getElementById('modal-invite-group');
    const modalInviteInput = document.getElementById('modal-invite-input');
    const modalSelectedContacts = document.getElementById('modal-selected-contacts');
    const btnSubmitModal = document.getElementById('modal-submit-btn');

    window.openModal = function(type) {
      modalType = type;
      modalInput.value = '';
      modalInviteInput.value = '';
      selectedContacts = [];
      hideError();
      closeSidebarMobile();
      renderSelectedContacts();

      modalInputGroup.classList.remove('hidden');
      modalInviteGroup.classList.add('hidden');
      btnSubmitModal.disabled = true;

      switch(type) {
        case 'contact':
          modalTitle.textContent = 'Add New Contact';
          modalInputLabel.textContent = 'Contact Username';
          modalInput.placeholder = '@username';
          btnSubmitModal.textContent = 'Add Contact';
          break;
        case 'dm':
          modalTitle.textContent = 'New Direct Message';
          modalInputLabel.textContent = 'User to DM';
          modalInput.placeholder = '@username';
          btnSubmitModal.textContent = 'Create';
          break;
        case 'channel':
          modalTitle.textContent = 'Create Channel';
          modalInputLabel.textContent = 'Channel Name';
          modalInput.placeholder = 'e.g. secret-project';
          btnSubmitModal.textContent = 'Create';
          modalInviteGroup.classList.remove('hidden');
          modalInviteGroup.style.display = 'flex';
          break;
        case 'invite_to_channel':
          const activeChat = allChats[activeChatId];
          modalTitle.textContent = `Invite to #${activeChat?.name}`;
          modalInputGroup.classList.add('hidden');
          modalInviteGroup.classList.remove('hidden');
          modalInviteGroup.style.display = 'flex';
          btnSubmitModal.textContent = 'Invite Members';
          break;
      }
      
      modalContainer.classList.remove('hidden');
      if(type !== 'invite_to_channel') modalInput.focus();
      else modalInviteInput.focus();
    };

    window.closeModal = function() {
      modalContainer.classList.add('hidden');
      modalType = null;
    };

    function showError(msg) {
      modalError.textContent = msg;
      modalError.classList.remove('hidden');
    }
    
    function hideError() {
      modalError.classList.add('hidden');
    }

    function checkModalSubmitDisabled() {
      if (modalType === 'contact' || modalType === 'dm') {
        btnSubmitModal.disabled = !modalInput.value.trim();
      } else if (modalType === 'channel') {
        btnSubmitModal.disabled = !modalInput.value.trim();
      } else if (modalType === 'invite_to_channel') {
        btnSubmitModal.disabled = selectedContacts.length === 0;
      }
    }

    modalInput.addEventListener('input', () => { hideError(); checkModalSubmitDisabled(); });
    modalInviteInput.addEventListener('input', hideError);

    document.getElementById('btn-add-chat').addEventListener('click', () => {
      openModal(activeTab === 'channel' ? 'channel' : 'dm');
    });

    document.getElementById('btn-invite-channel').addEventListener('click', () => {
      openModal('invite_to_channel');
    });

    // Add invite user tags
    document.getElementById('btn-add-invite').addEventListener('click', handleAddInvite);
    modalInviteInput.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') {
        e.preventDefault();
        handleAddInvite();
      }
    });

    function handleAddInvite() {
      const inviteName = modalInviteInput.value.trim();
      if (!inviteName) return;

      if (inviteName.toLowerCase() === userName.toLowerCase()) {
        showError("You are already in the channel!"); return;
      }
      if (!knownUsers.includes(inviteName.toLowerCase())) {
        showError("This user does not exist!"); return;
      }
      const activeChat = allChats[activeChatId];
      if (modalType === 'invite_to_channel' && activeChat?.participants?.some(p => p.toLowerCase() === inviteName.toLowerCase())) {
        showError("User is already in this channel!"); return;
      }
      
      if (!selectedContacts.some(c => c.toLowerCase() === inviteName.toLowerCase())) {
        selectedContacts.push(inviteName);
        modalInviteInput.value = '';
        hideError();
        renderSelectedContacts();
        checkModalSubmitDisabled();
      } else {
        showError("User already added!");
      }
    }

    window.removeContactTag = function(contact) {
      selectedContacts = selectedContacts.filter(c => c !== contact);
      renderSelectedContacts();
      checkModalSubmitDisabled();
    }

    function renderSelectedContacts() {
      modalSelectedContacts.innerHTML = selectedContacts.map(contact => `
        <div class="flex items-center gap-1.5 bg-[#2a344a] px-3 py-1.5 rounded-lg">
          <span class="text-sm text-slate-200">${contact}</span>
          <button type="button" onclick="removeContactTag('${contact}')" class="text-slate-400 hover:text-white">
            <i data-lucide="x" class="w-3 h-3"></i>
          </button>
        </div>
      `).join('');
      lucide.createIcons();
    }

    // Modal Submit
    document.getElementById('modal-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      if (!firebaseUser) return;
      
      const inputVal = modalInput.value.trim();

      if (modalType === 'contact' || modalType === 'dm') {
        if (!inputVal) return;
        if (inputVal.toLowerCase() === userName.toLowerCase()) {
          showError("You can't add yourself!"); return;
        }
        if (!knownUsers.includes(inputVal.toLowerCase())) {
          showError("This user does not exist!"); return;
        }

        if (!contacts.includes(inputVal)) {
          contacts.push(inputVal);
          document.getElementById('sidebar-contacts-count').textContent = `${contacts.length} contacts`;
        }
        
        const existingDm = Object.values(allChats).find(
          c => c.type === 'dm' && c.name.toLowerCase() === inputVal.toLowerCase()
        );
        
        if (existingDm) {
          selectChat(existingDm.id);
        } else {
          const newId = `dm_${Date.now()}`;
          await setDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'chats', newId), { 
            id: newId, name: inputVal, type: 'dm', participants: [inputVal] 
          });
          selectChat(newId);
        }
        setActiveTab('dm');
      } 
      else if (modalType === 'channel' && inputVal) {
        const newId = `chan_${Date.now()}`;
        await setDoc(doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'chats', newId), { 
          id: newId, name: inputVal, type: 'channel', participants: [...selectedContacts] 
        });
        selectChat(newId);
        setActiveTab('channel');
      }
      else if (modalType === 'invite_to_channel') {
        if (selectedContacts.length > 0) {
          const chatRef = doc(db, 'artifacts', APP_NAMESPACE, 'public', 'data', 'chats', activeChatId);
          const activeChat = allChats[activeChatId];
          const currentParticipants = activeChat.participants || [];
          const newParticipants = selectedContacts.filter(sc => 
            !currentParticipants.some(cp => cp.toLowerCase() === sc.toLowerCase())
          );
          const updatedParticipants = [...currentParticipants, ...newParticipants];
          await updateDoc(chatRef, { participants: updatedParticipants });
        }
      }
      closeModal();
    });

  </script>
</body>
</html>
